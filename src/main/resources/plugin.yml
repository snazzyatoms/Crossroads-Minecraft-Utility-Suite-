name: Crossroads
version: ${project.version}
main: dev.crossroadsmc.crossroads.CrossroadsPlugin
api-version: "1.16"
author: Kai
description: Release-ready Minecraft utility suite with teleport requests, moderation, storage backends, and rich server-core tools.
softdepend: [Vault, PlaceholderAPI, Coffers, AegisGuard]

commands:
  home:
    description: Teleport to one of your homes.
    usage: /home [name]
  sethome:
    description: Save your current location as a home.
    usage: /sethome [name]
  delhome:
    description: Delete one of your homes.
    usage: /delhome [name]
  homes:
    description: List your saved homes.
    usage: /homes
  warp:
    description: Teleport to a server warp.
    usage: /warp <name>
  setwarp:
    description: Create a new warp.
    usage: /setwarp <name>
  delwarp:
    description: Delete a warp.
    usage: /delwarp <name>
  warps:
    description: List server warps.
    usage: /warps
  spawn:
    description: Teleport to server spawn.
    usage: /spawn
  setspawn:
    description: Set the server spawn.
    usage: /setspawn
  back:
    description: Return to your previous location.
    usage: /back
  tpa:
    description: Request teleport access to another player.
    usage: /tpa <player>
  tpahere:
    description: Ask a player to teleport to you.
    usage: /tpahere <player>
  tpaccept:
    description: Accept a teleport request.
    usage: /tpaccept
  tpdeny:
    description: Deny a teleport request.
    usage: /tpdeny
  tpacancel:
    description: Cancel your outgoing teleport request.
    usage: /tpacancel
  rtp:
    description: Randomly teleport to a safe location.
    usage: /rtp
  msg:
    description: Send a private message.
    usage: /msg <player> <message>
    aliases: [tell, whisper]
  reply:
    description: Reply to the last person who messaged you.
    usage: /reply <message>
    aliases: [r]
  ignore:
    description: Toggle private messages from another player.
    usage: /ignore <player>
  mail:
    description: Manage offline mail.
    usage: /mail <send|read|clear|inbox>
  nick:
    description: Set your nickname.
    usage: /nick <name|off>
  fly:
    description: Toggle flight mode.
    usage: /fly
  vanish:
    description: Toggle vanish mode.
    usage: /vanish
  staffmode:
    description: Toggle staff mode.
    usage: /staffmode
  socialspy:
    description: View direct messages as staff.
    usage: /socialspy
  invsee:
    description: Inspect a player's inventory.
    usage: /invsee <player>
  endersee:
    description: Inspect a player's ender chest.
    usage: /endersee <player>
  freeze:
    description: Freeze a player in place.
    usage: /freeze <player> [reason]
  unfreeze:
    description: Unfreeze a player.
    usage: /unfreeze <player>
  mute:
    description: Mute a player for a duration.
    usage: /mute <player> <duration> [reason]
  unmute:
    description: Remove a player's mute.
    usage: /unmute <player>
  warn:
    description: Record a categorized moderation warning.
    usage: /warn <player> [category] <reason>
  stafflog:
    description: View moderation history for a player.
    usage: /stafflog <player> [limit]
  history:
    description: Alias for /stafflog.
    usage: /history <player> [limit]
  seen:
    description: Check when a player was last online.
    usage: /seen <player>
  kick:
    description: Kick a player from the server.
    usage: /kick <player> [reason]
  tempban:
    description: Ban a player for a duration.
    usage: /tempban <player> <duration> [reason]
  unban:
    description: Remove a player's Crossroads ban.
    usage: /unban <player>
  jail:
    description: Jail a player.
    usage: /jail <player> <jail> [duration] [reason]
  unjail:
    description: Release a player from jail.
    usage: /unjail <player>
  setjail:
    description: Create a jail point.
    usage: /setjail <name>
  shadowmute:
    description: Toggle shadow mute for a player.
    usage: /shadowmute <player>
  staffnote:
    description: Add a private staff note to a player's history.
    usage: /staffnote <player> <note>
  kit:
    description: Claim or list available kits.
    usage: /kit [name]
  rules:
    description: View the server rules.
    usage: /rules
  motd:
    description: View the message of the day.
    usage: /motd
  help:
    description: View Crossroads help pages.
    usage: /help [page]
  info:
    description: View Crossroads info pages.
    usage: /info [page]
  crossroads:
    description: Crossroads admin command.
    usage: /crossroads [reload|backup create|about|modules|import essentials]
    aliases: [cr]

permissions:
  crossroads.home:
    description: Use homes commands.
    default: true
  crossroads.home.unlimited:
    description: Bypass the home limit.
    default: op
  crossroads.warp:
    description: Use warp commands.
    default: true
  crossroads.spawn:
    description: Use spawn and teleport request commands.
    default: true
  crossroads.back:
    description: Use /back.
    default: true
  crossroads.msg:
    description: Use private messaging commands.
    default: true
  crossroads.kit:
    description: Use kit commands.
    default: true
  crossroads.cooldown.bypass:
    description: Bypass Crossroads command cooldowns.
    default: op
  crossroads.kit.starter:
    description: Claim the starter kit.
    default: true
  crossroads.kit.builder:
    description: Claim the builder kit.
    default: true
  crossroads.kit.adventurer:
    description: Claim the adventurer kit.
    default: true
  crossroads.rules:
    description: View server rules.
    default: true
  crossroads.teleport:
    description: Use teleport request commands.
    default: true
  crossroads.staff:
    description: Use staff utility commands.
    default: op
  crossroads.staff.see:
    description: See vanished staff members.
    default: op
  crossroads.inspect:
    description: Use staff inspection commands.
    default: op
  crossroads.moderation:
    description: Use moderation commands and logs.
    default: op
  crossroads.admin:
    description: Use administrative Crossroads commands.
    default: op
